spring:
  application:
    name: publisher-service

server:
  port: 8081

# Default profile configuration (can be overridden by specific profiles)
rabbitmq:
  host: ${RABBITMQ_HOST:localhost}
  port: ${RABBITMQ_PORT:5672}
  username: ${RABBITMQ_USERNAME:admin}
  password: ${RABBITMQ_PASSWORD:admin123}
  virtual-host: ${RABBITMQ_VHOST:/}
  ssl:
    enabled: ${RABBITMQ_SSL_ENABLED:false}
  exchange:
    order: ${RABBITMQ_ORDER_EXCHANGE:order.exchange}
  queue:
    order:
      created: ${RABBITMQ_ORDER_CREATED_QUEUE:order.created.queue}
  routing:
    key:
      order:
        created: ${RABBITMQ_ORDER_CREATED_ROUTING_KEY:order.created}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.myorder.publisher: INFO
    org.springframework.amqp: DEBUG